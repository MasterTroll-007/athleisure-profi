name: Production Clean Blocks

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE_BLOCKS to remove all production calendar blocks and reservations'
        required: true
        type: string

jobs:
  clean-blocks:
    name: Clean Production Blocks
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DELETE_BLOCKS" ]; then
            echo "Confirmation did not match DELETE_BLOCKS"
            exit 1
          fi

      - name: Clean blocks on production server
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            cd ~/fitness-app
            test -f .env || { echo ".env is missing on the server"; exit 1; }
            mkdir -p backups/postgres
            echo "maintenance: starting database"
            docker compose up -d db
            echo "maintenance: creating pre-clean database backup"
            backup_file="backups/postgres/manual-clean-blocks-$(date -u +%Y%m%dT%H%M%SZ).dump"
            docker compose exec -T db pg_dump -U fitness -d fitness --format=custom --no-owner --no-acl > "$backup_file"
            echo "maintenance: backup saved to $backup_file"
            echo "maintenance: deleting calendar blocks and dependent reservation data"
            docker compose exec -T db psql -U fitness -d fitness -v ON_ERROR_STOP=1 <<'SQL'
            BEGIN;

            \echo 'before'
            SELECT 'availability_blocks' AS table_name, count(*) FROM availability_blocks
            UNION ALL SELECT 'slots', count(*) FROM slots
            UNION ALL SELECT 'slot_pricing_items', count(*) FROM slot_pricing_items
            UNION ALL SELECT 'reservations', count(*) FROM reservations
            UNION ALL SELECT 'reminders_sent', count(*) FROM reminders_sent
            UNION ALL SELECT 'training_feedback', count(*) FROM training_feedback
            UNION ALL SELECT 'workout_logs', count(*) FROM workout_logs
            UNION ALL SELECT 'recurring_reservations', count(*) FROM recurring_reservations
            ORDER BY table_name;

            DELETE FROM reminders_sent WHERE reservation_id IN (SELECT id FROM reservations);
            DELETE FROM training_feedback WHERE reservation_id IN (SELECT id FROM reservations);
            DELETE FROM workout_logs WHERE reservation_id IN (SELECT id FROM reservations);
            DELETE FROM reservations;
            DELETE FROM slot_pricing_items WHERE slot_id IN (SELECT id FROM slots);
            DELETE FROM slots;
            DELETE FROM recurring_reservations;
            DELETE FROM availability_blocks;

            \echo 'after'
            SELECT 'availability_blocks' AS table_name, count(*) FROM availability_blocks
            UNION ALL SELECT 'slots', count(*) FROM slots
            UNION ALL SELECT 'slot_pricing_items', count(*) FROM slot_pricing_items
            UNION ALL SELECT 'reservations', count(*) FROM reservations
            UNION ALL SELECT 'reminders_sent', count(*) FROM reminders_sent
            UNION ALL SELECT 'training_feedback', count(*) FROM training_feedback
            UNION ALL SELECT 'workout_logs', count(*) FROM workout_logs
            UNION ALL SELECT 'recurring_reservations', count(*) FROM recurring_reservations
            ORDER BY table_name;

            COMMIT;
            SQL
            echo "maintenance: restarting backend"
            docker compose restart backend
            echo "maintenance: backend health"
            docker compose exec -T backend wget -qO- http://127.0.0.1:8080/api/health
